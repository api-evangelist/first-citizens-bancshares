apis:
  - aid: first-citizens-bancshares:svb-authorization-api
    name: SVB Authorization API
    description: >-
      The Authorization API issues OAuth2 access tokens for the SVB commercial
      banking platform (now part of First Citizens). Partners exchange client
      credentials at /v1/security/oauth/token for a bearer token, then sign
      request payloads with a JSON Web Signature (JWS) using their registered
      keys. This API is the entry point for every other commercial banking
      product on the portal and defines the OAuth2 client-credentials plus
      request-signing security model used across the platform.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/authorization-api/1.0/authorization
    baseURL: https://api.svb.com
    tags:
      - Authentication
      - OAuth2
      - Security
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/authorization-api/1.0/authorization
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/authorization-api/1.0/authorization-api?path=/v1/security/oauth/token
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/authorization-api/1.0/json-web-signature-jws
  - aid: first-citizens-bancshares:svb-account-balance-api
    name: SVB Account Balance API
    description: >-
      The Account Balance API returns current and available balance information
      for SVB commercial deposit accounts. Clients query /v1/accounts/balances
      to retrieve real-time balance positions for cash management, treasury
      reporting, and reconciliation workflows. It is part of the SVB commercial
      banking API family operated under First Citizens BancShares and secured
      with the platform's OAuth2 plus JWS model.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/account-balance/1.0/account-balance-overview
    baseURL: https://api.svb.com
    tags:
      - Accounts
      - Balances
      - Treasury
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/account-balance/1.0/account-balance-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/account-balance/1.0/account-balance?path=/v1/accounts/balances
  - aid: first-citizens-bancshares:svb-account-transfer-api
    name: SVB Account Transfer API
    description: >-
      The Account Transfer API moves funds between a client's own SVB accounts.
      Partners create transfers at /v1/payment/account-transfers and retrieve
      transfer status by id, enabling internal book transfers and automated cash
      concentration. It is part of the SVB commercial banking API family under
      First Citizens BancShares, secured with OAuth2 and JWS request signing.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/account-transfer/1.0/account-transfer-overview
    baseURL: https://api.svb.com
    tags:
      - Payments
      - Transfers
      - Treasury
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/account-transfer/1.0/account-transfer-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/account-transfer/1.0/account-transfer?path=/v1/payment/account-transfers
  - aid: first-citizens-bancshares:svb-ach-transfers-api
    name: SVB ACH Transfers API
    description: >-
      The ACH Transfers API (v2.1) originates domestic ACH credits and debits,
      verified ACH transfers, and IAT (International ACH Transaction) domestic
      entries. It exposes /v2/transfer/domestic-achs,
      /v2/transfer/domestic-verified-achs, and /v2/transfer/iat-domestic-achs
      with create, retrieve, and patch operations, and integrates Plaid-powered
      instant account verification. Part of the SVB commercial banking family
      under First Citizens BancShares, it ships a v2 migration guide and detailed
      error catalog.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/ach-transfers/2.1/ach-overview
    baseURL: https://api.svb.com
    tags:
      - Payments
      - ACH
      - Transfers
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/ach-transfers/2.1/ach-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/ach-transfers/2.1/ach-transfers?path=/v2/transfer/domestic-achs
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/ach-transfers/2.1/ach-transfers-v2-migration-guide
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/ach-transfers/2.1/instant-account-verification-v2-plaid-integration
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/ach-transfers/2.1/ach-errors
  - aid: first-citizens-bancshares:svb-instant-payments-api
    name: SVB Instant Payments API
    description: >-
      The Instant Payments API sends and tracks real-time payments over U.S.
      instant rails. Partners create payments at /v1/payment/instant-payments and
      retrieve payment status by id for immediate, irrevocable settlement use
      cases such as disbursements and just-in-time funding. It is part of the SVB
      commercial banking API family under First Citizens BancShares and includes
      a dedicated error reference.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/instant-payments/1.0/instant-payments-overview
    baseURL: https://api.svb.com
    tags:
      - Payments
      - Real Time Payments
      - Instant Payments
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/instant-payments/1.0/instant-payments-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/instant-payments/1.0/instant-payments?path=/v1/payment/instant-payments
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/instant-payments/1.0/instant-payments-errors
  - aid: first-citizens-bancshares:svb-wires-api
    name: SVB Wires API
    description: >-
      The Wires API (v2.1) initiates and manages domestic and international wire
      transfers. Partners create wires at /v2/payment/wires, retrieve wire status
      by id, and cancel pending wires, supporting high-value, time-critical
      treasury payment flows. It is part of the SVB commercial banking API family
      under First Citizens BancShares, secured with OAuth2 and JWS, and ships a
      wire-specific error catalog.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/wires-api/2.1/wires-overview
    baseURL: https://api.svb.com
    tags:
      - Payments
      - Wire Transfers
      - Treasury
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/wires-api/2.1/wires-overview
      - type: APIReference
