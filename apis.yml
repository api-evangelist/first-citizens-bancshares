  - aid: first-citizens-bancshares:svb-stop-payment-api
    name: SVB Stop Payment API
    description: >-
      The Stop Payment API places and inspects stop-payment orders on checks
      drawn against SVB commercial accounts. Partners create stop requests at
      /v1/payment/stop-checks and retrieve stop status by id to prevent specific
      checks from clearing. It is part of the SVB commercial banking API family
      operated under First Citizens BancShares and secured with the platform's
      OAuth2 plus JWS model.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/stop-payment/1.0/stop-payment-overview
    baseURL: https://api.svb.com
    tags:
      - Payments
      - Checks
      - Risk
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/stop-payment/1.0/stop-payment-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/stop-payment/1.0/stop-payment?path=/v1/payment/stop-checks
  - aid: first-citizens-bancshares:svb-virtual-cards-api
    name: SVB Virtual Cards API
    description: >-
      The Virtual Cards API (v2.0) issues and manages virtual card numbers (VCN)
      for accounts-payable, procurement, and travel spend. It exposes
      /v2/card/virtualcards plus authorizations, clearings, real-cards,
      suppliers, and templates resources, letting partners create single-use or
      controlled-spend cards and reconcile card activity programmatically. Part
      of the SVB commercial banking API family under First Citizens BancShares.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/virtual-cards/2.0/virtual-cards-vcn-overview
    baseURL: https://api.svb.com
    tags:
      - Cards
      - Virtual Cards
      - Payments
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/virtual-cards/2.0/virtual-cards-vcn-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/virtual-cards/2.0/virtual-cards?path=/v2/card/virtualcards
  - aid: first-citizens-bancshares:svb-webhook-api
    name: SVB Webhook API
    description: >-
      The Webhook API (v2.0) delivers asynchronous event notifications for
      payment and account activity. Partners manage event-types, events,
      publishers, and subscriptions under /v2/event/*, creating subscriptions and
      firing test deliveries so integrations react to state changes without
      polling. It is part of the SVB commercial banking API family under First
      Citizens BancShares.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/webhook-api/2.0/webhooks-overview
    baseURL: https://api.svb.com
    tags:
      - Webhooks
      - Events
      - Notifications
      - Commercial Banking
      - United States
    properties:
      - type: Documentation
        url: https://developer.svb.com/apis/commercial-banking-apis/webhook-api/2.0/webhooks-overview
      - type: APIReference
        url: https://developer.svb.com/apis/commercial-banking-apis/webhook-api/2.0/webhook-api?path=/v2/event/subscriptions
  - aid: first-citizens-bancshares:svb-reference-api
    name: SVB Reference API
    description: >-
      The Reference API provides look-up and reachability data supporting the
      payment products. It exposes
      /v1/reference/reachability/instant-payments/{creditor_agent_id} so partners
      can verify whether a receiving financial institution can accept instant
      payments before origination. It is part of the SVB commercial banking API
      family under First Citizens BancShares and secured with OAuth2 and JWS.
    humanURL: https://developer.svb.com/apis/commercial-banking-apis/reference-api/1.0/reference-overview
    baseURL: https://api.svb.com
    tags:
