aid: first-citizens-bancshares
name: First Citizens BancShares
kind: company
description: >-
  First Citizens BancShares is a super-regional financial holding company
  (parent of First-Citizens Bank & Trust) providing general banking, trust,
  investment, insurance, and asset-management services to individuals,
  businesses, and professionals. Its programmable surface runs through Silicon
  Valley Bank (SVB) — acquired in 2023 and now a division of First Citizens —
  whose Apigee-backed developer portal at developer.svb.com publishes a family
  of commercial banking REST APIs covering authorization, account balance,
  transfers, ACH, instant payments, wires, stop payment, virtual cards,
  webhooks, and reference/reachability. Access is partner-gated (commercial
  onboarding); consumer account data is reachable via the Plaid aggregator.
